name: GitHub Stargazers Feed
description: Generate recent GitHub stargazer JSON/RSS files and optional Discord notifications.
author: Oddship

inputs:
  mode:
    description: Execution mode (generate, discord, or generate-and-discord).
    required: false
  owner:
    description: GitHub user or organization login to inspect.
    required: false
  owner_type:
    description: Optional owner type hint (user, organization, or auto).
    required: false
  repo_include:
    description: Comma or newline separated repo names to include.
    required: false
  repo_exclude:
    description: Comma or newline separated repo names to exclude.
    required: false
  recent_limit:
    description: Maximum number of recent star events to emit globally.
    required: false
  per_repo_limit:
    description: Maximum number of recent star events to fetch per repo.
    required: false
  include_forks:
    description: Include fork repositories when discovering repos.
    required: false
  include_archived:
    description: Include archived repositories when discovering repos.
    required: false
  json_output:
    description: Output path for generated JSON, relative to GITHUB_WORKSPACE.
    required: false
  feed_output:
    description: Output path for generated RSS XML, relative to GITHUB_WORKSPACE.
    required: false
  site_url:
    description: Canonical site URL used for feed metadata.
    required: false
  feed_title:
    description: Title for the generated RSS feed.
    required: false
  feed_description:
    description: Description for the generated RSS feed.
    required: false
  state_backend:
    description: Notification state backend (file, feed-url, or github-branch).
    required: false
  state_path:
    description: State file path for file/github-branch backends.
    required: false
  state_max_entries:
    description: Maximum number of seen event ids retained in state.
    required: false
  baseline_feed_url:
    description: Existing feed URL used as a read-only baseline for diffing.
    required: false
  state_repository:
    description: Repository used by the github-branch state backend.
    required: false
  state_branch:
    description: Branch used by the github-branch state backend.
    required: false
  state_token:
    description: Token used by the github-branch state backend.
    required: false
  state_commit_message:
    description: Commit message used when persisting github-branch state.
    required: false
  discord_webhook_url:
    description: Discord webhook execute URL.
    required: false
  discord_username:
    description: Optional username override for Discord messages.
    required: false
  discord_avatar_url:
    description: Optional avatar override for Discord messages.
    required: false
  discord_bootstrap:
    description: Bootstrap behavior for first run (silent or send-all).
    required: false
  discord_notify_mode:
    description: Discord delivery mode (summary or per-star).
    required: false
  config:
    description: Optional YAML or JSON config file, relative to GITHUB_WORKSPACE.
    required: false
  token:
    description: GitHub token used for GraphQL requests.
    required: false

outputs:
  mode:
    description: Effective execution mode.
  json-path:
    description: Relative JSON output path.
  feed-path:
    description: Relative RSS output path.
  feed-url:
    description: Public feed URL derived from site_url + feed_output.
  repo-count:
    description: Number of selected repositories included in the snapshot.
  star-count:
    description: Number of recent star events emitted in the snapshot.
  new-event-count:
    description: Number of new events detected against the configured baseline.
  discord-message-count:
    description: Number of Discord webhook messages sent.
  state-backend:
    description: Effective notification state backend.

runs:
  using: node24
  main: dist/index.cjs

branding:
  icon: star
  color: blue
